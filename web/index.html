<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Baskaran Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Prevent text scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <title>workspace</title>
  <link rel="manifest" href="manifest.json">

  <!-- Material Icons Font -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />

  <style>
    body {
      background-color: #000000;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loading-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.5s ease-out;
      width: 100%;
    }

    .apple-logo {
      width: 80px;
      height: 80px;
      filter: brightness(0) invert(1);
      user-select: none;
      animation: fadeIn 1.2s ease-out forwards;
    }
    
    .loader-bar-container {
      margin-top: 60px;
      width: 200px;
      height: 4px;
      background-color: #333333;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .loader-bar-fill {
      width: 0%;
      height: 100%;
      background-color: #ffffff;
      border-radius: 2px;
      animation: progress 3.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
        transform: scale(0.95);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes progress {
      0% {
        width: 0%;
      }
      20% {
        width: 10%;
      }
      35% {
        width: 45%;
      }
      60% {
        width: 65%;
      }
      80% {
        width: 85%;
      }
      100% {
        width: 100%;
      }
    }
  </style>
</head>

<body oncontextmenu="return false;">
  <div id="loading" class="loading-container">
    <img class="apple-logo" src="assets/asset/apple-logo.png" 
         onerror="this.onerror=null; this.src='asset/apple-logo.png';" 
         alt="Apple Logo" />
    <div class="loader-bar-container">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window._removePreloader = function() {
      const loader = document.getElementById('loading');
      if (loader) {
        console.log('Removing preloader...');
        loader.style.opacity = '0';
        setTimeout(() => {
          loader.remove();
          console.log('Preloader removed from DOM.');
        }, 500);
      }
    };

    // Auto-remove fallback after 10 seconds in case Flutter fails
    setTimeout(window._removePreloader, 10000);
  </script>
</body>

</html>
