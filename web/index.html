<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Baskaran Portfolio">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Prevent text scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />

  <title>workspace</title>
  <link rel="manifest" href="manifest.json">

  <!-- Material Icons Font -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />

  <style>
    body {
      background-color: #0d1117;
      /* AppColors.backgroundDark */
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .loading-container {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: opacity 0.5s ease-out;
    }

    .material-symbols-outlined {
      font-size: 80px;
      color: #00EEFF;
      /* AppColors.terminalBlue */
      animation: pulse 2s infinite ease-in-out;
      user-select: none;
    }

    .loader-ring {
      margin-top: 20px;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0, 238, 255, 0.2);
      border-radius: 50%;
      border-top-color: #00EEFF;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0% {
        transform: scale(0.95);
        opacity: 0.8;
        text-shadow: 0 0 10px rgba(0, 238, 255, 0.3);
      }

      50% {
        transform: scale(1.05);
        opacity: 1;
        text-shadow: 0 0 20px rgba(0, 238, 255, 0.6);
      }

      100% {
        transform: scale(0.95);
        opacity: 0.8;
        text-shadow: 0 0 10px rgba(0, 238, 255, 0.3);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body oncontextmenu="return false;">
  <div id="loading" class="loading-container">
    <span class="material-symbols-outlined">terminal</span>
    <div class="loader-ring"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Optional: Add logic to remove loader if Flutter doesn't handle it automatically
    // Currently, Flutter's bootstrap handles the entrypoint.
    // The Flutter app will cover this loader when it paints.
  </script>
</body>

</html>
